name: Node.js CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build || echo "No build script"

      - name: Start server briefly
        run: |
          node server.js &
          sleep 5
          echo "Server ran successfully"

      - name: CI check complete
        run: echo "Project setup and dependencies are OK!"